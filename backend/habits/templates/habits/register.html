<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HabitHamster — Регистрация</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            background:
                radial-gradient(circle at top left, #dcfce7 0, transparent 35%),
                radial-gradient(circle at top right, #ffedd5 0, transparent 30%),
                #f7f7f3;
            color: #172033;
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .auth-card {
            width: 100%;
            max-width: 460px;
            background: white;
            border-radius: 28px;
            padding: 34px;
            box-shadow: 0 26px 70px rgba(15, 23, 42, 0.14);
        }

        .logo {
            width: 72px;
            height: 72px;
            border-radius: 24px;
            border: 4px solid #111827;
            display: grid;
            place-items: center;
            font-size: 34px;
            margin-bottom: 18px;
            background: white;
        }

        h1 {
            margin: 0;
            font-size: 32px;
            letter-spacing: -0.04em;
        }

        .subtitle {
            color: #6b7280;
            margin: 8px 0 22px;
            line-height: 1.45;
        }

        .error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
            padding: 12px;
            border-radius: 14px;
            margin-bottom: 16px;
            font-weight: 800;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: 900;
            margin-bottom: 7px;
        }

        input {
            width: 100%;
            border: 1px solid #e5e7eb;
            border-radius: 14px;
            padding: 13px;
            font-size: 16px;
            outline: none;
        }

        input:focus {
            border-color: #22c55e;
            box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.12);
        }

        .hint {
            color: #6b7280;
            font-size: 13px;
            margin-top: 6px;
        }

        .btn {
            width: 100%;
            border: none;
            border-radius: 14px;
            padding: 14px 18px;
            font-weight: 950;
            cursor: pointer;
            background: #22c55e;
            color: white;
            font-size: 16px;
            margin-top: 8px;
        }

        .btn:hover {
            background: #16a34a;
        }

        .footer-link {
            text-align: center;
            margin-top: 20px;
            color: #6b7280;
        }

        .footer-link a {
            color: #16a34a;
            font-weight: 900;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <main class="auth-card">
        <div class="logo">🐹</div>

        <h1>Создать аккаунт</h1>
        <div class="subtitle">Почта, логин и пароль. Всё просто.</div>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <div class="form-group">
                <label for="email">Почта</label>
                <input
                    id="email"
                    name="email"
                    type="email"
                    value="{{ email|default:'' }}"
                    placeholder="example@mail.com"
                    required
                />
            </div>

            <div class="form-group">
                <label for="username">Логин</label>
                <input
                    id="username"
                    name="username"
                    type="text"
                    value="{{ username|default:'' }}"
                    placeholder="gogita"
                    minlength="3"
                    required
                />
                <div class="hint">Минимум 3 символа, без пробелов.</div>
            </div>

            <div class="form-group">
                <label for="password">Пароль</label>
                <input
                    id="password"
                    name="password"
                    type="password"
                    placeholder="Минимум 6 символов"
                    minlength="6"
                    required
                />
            </div>

            <div class="form-group">
                <label for="password_repeat">Повтор пароля</label>
                <input
                    id="password_repeat"
                    name="password_repeat"
                    type="password"
                    placeholder="Повтори пароль"
                    minlength="6"
                    required
                />
            </div>

            <button class="btn" type="submit">Зарегистрироваться</button>
        </form>

        <div class="footer-link">
            Уже есть аккаунт?
            <a href="/api/login/">Войти</a>
        </div>
    </main>
</body>
</html>
