<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>HabitHamster — Добавить привычку</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Rubik:wght@500;600;700&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#4CAF50', secondary: '#81C784', accent: '#FF9800',
            background: '#FAF8F5', surface: '#FFFFFF', text: '#2E3333', muted: '#6B7280'
          },
          fontFamily: { sans: ['Inter', 'sans-serif'], display: ['Rubik', 'sans-serif'] }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Inter', sans-serif; background: #FAF8F5; }
    .glass-card { background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); border: 1px solid rgba(255,255,255,0.5); }
    .nav-link { transition: all 0.2s ease; }
    .nav-link:hover { background: rgba(76,175,80,0.1); }
    .nav-link.active { background: rgba(76,175,80,0.15); color: #4CAF50; font-weight: 600; }
    .modal-overlay { background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); }
  </style>
</head>
<body class="min-h-screen">

<!-- 🔗 Навигационная панель -->
<nav class="fixed top-0 left-0 right-0 z-50 bg-white/95 backdrop-blur-sm border-b border-gray-200 shadow-sm">
  <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
    <a href="index.html" class="flex items-center gap-2 text-green-600 hover:text-green-700 font-semibold transition-colors">
      <i class="fas fa-arrow-left"></i>
      <span class="hidden sm:inline">Презентация</span>
    </a>
    <div class="flex items-center gap-1 bg-gray-100 rounded-lg p-1">
      <a href="1_dashboard_with_calendar.html" class="px-3 py-1.5 rounded-md text-sm font-medium text-gray-600 hover:bg-white hover:shadow-sm">Дашборд</a>
      <a href="2_analytics.html" class="px-3 py-1.5 rounded-md text-sm font-medium text-gray-600 hover:bg-white hover:shadow-sm">Аналитика</a>
      <a href="3_habit_details.html" class="px-3 py-1.5 rounded-md text-sm font-medium text-gray-600 hover:bg-white hover:shadow-sm">Привычка</a>
      <a href="4_add_habit_modal.html" class="px-3 py-1.5 rounded-md text-sm font-medium bg-white shadow-sm text-green-600">Добавить</a>
    </div>
    <span class="text-sm text-gray-500">Страница 4 из 4</span>
  </div>
</nav>
<div class="pt-20"></div>

<!-- Основной контент с модальным окном -->
<main class="max-w-7xl mx-auto px-4 py-6">
  
  <!-- Modal Overlay -->
  <div class="fixed inset-0 modal-overlay z-50 flex items-center justify-center p-4">
    <div class="glass-card w-full max-w-lg p-6 relative">
      
      <!-- Close Button -->
      <button class="absolute top-4 right-4 w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center hover:bg-gray-200 transition-colors">
        <i class="fas fa-times text-gray-600"></i>
      </button>

      <!-- Header -->
      <div class="text-center mb-6">
        <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-3">
          <i class="fas fa-plus text-green-600 text-2xl"></i>
        </div>
        <h2 class="text-2xl font-bold text-gray-800 font-display">Новая привычка</h2>
        <p class="text-sm text-gray-600 mt-1">Каждое маленькое действие превращается в уютную норку</p>
      </div>

      <!-- Form -->
      <form class="space-y-4">
        <!-- Name -->
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">Название привычки</label>
          <input type="text" placeholder="Например: Утренняя йога" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent"/>
        </div>

        <!-- Icons -->
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">Выбери иконку</label>
          <div class="flex gap-2 flex-wrap">
            <button type="button" class="w-12 h-12 rounded-xl bg-green-100 flex items-center justify-center hover:bg-green-200 transition-colors">
              <i class="fas fa-leaf text-green-600"></i>
            </button>
            <button type="button" class="w-12 h-12 rounded-xl bg-blue-100 flex items-center justify-center hover:bg-blue-200 transition-colors">
              <i class="fas fa-dumbbell text-blue-600"></i>
            </button>
            <button type="button" class="w-12 h-12 rounded-xl bg-purple-100 flex items-center justify-center hover:bg-purple-200 transition-colors">
              <i class="fas fa-book text-purple-600"></i>
            </button>
            <button type="button" class="w-12 h-12 rounded-xl bg-orange-100 flex items-center justify-center hover:bg-orange-200 transition-colors">
              <i class="fas fa-spa text-orange-600"></i>
            </button>
            <button type="button" class="w-12 h-12 rounded-xl bg-cyan-100 flex items-center justify-center hover:bg-cyan-200 transition-colors">
              <i class="fas fa-tint text-cyan-600"></i>
            </button>
            <button type="button" class="w-12 h-12 rounded-xl bg-gray-100 flex items-center justify-center hover:bg-gray-200 transition-colors">
              <i class="fas fa-plus text-gray-600"></i>
            </button>
          </div>
        </div>

        <!-- Frequency -->
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">Частота</label>
          <div class="flex gap-2">
            <button type="button" class="flex-1 px-4 py-3 bg-green-500 text-white rounded-xl font-semibold">Ежедневно</button>
            <button type="button" class="flex-1 px-4 py-3 bg-white border border-gray-200 text-gray-700 rounded-xl font-semibold hover:bg-gray-50">Еженедельно</button>
          </div>
        </div>

        <!-- Duration -->
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">Длительность (мин)</label>
          <input type="number" placeholder="15" class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent"/>
        </div>

        <!-- Category -->
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-2">Категория цели</label>
          <div class="grid grid-cols-3 gap-2">
            <button type="button" class="px-4 py-3 bg-green-50 text-green-700 rounded-xl font-semibold border-2 border-green-500">Здоровье</button>
            <button type="button" class="px-4 py-3 bg-white text-gray-700 rounded-xl font-semibold border border-gray-200 hover:bg-gray-50">Осознанность</button>
            <button type="button" class="px-4 py-3 bg-white text-gray-700 rounded-xl font-semibold border border-gray-200 hover:bg-gray-50">Продуктивность</button>
          </div>
        </div>

        <!-- Submit -->
        <button type="submit" class="w-full py-4 bg-green-500 text-white rounded-xl font-bold text-lg hover:bg-green-600 transition-colors flex items-center justify-center gap-2">
          <i class="fas fa-magic"></i>
          Создать привычку
        </button>
      </form>
    </div>
  </div>
</main>

<script>
document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowLeft') window.location.href = '3_habit_details.html';
  if (e.key === 'Home') window.location.href = 'index.html';
  if (e.key === 'Escape') window.location.href = '1_dashboard_with_calendar.html';
});
</script>
</body>
</html>
