name: Deploy Presentation to GitHub Pages

on:
  push:
    branches: [ "main" ]
    paths:
      - 'project_presentation/Presentation_1/**'
  workflow_dispatch: # Позволяет запустить вручную

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Copy presentation files to root for deployment
        run: |
          mkdir -p ./deploy
          cp project_presentation/Presentation_1/*.html ./deploy/
          # Если есть папка с картинками/стилями — раскомментируйте:
          # cp -r project_presentation/Presentation_1/assets ./deploy/ 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './deploy'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4